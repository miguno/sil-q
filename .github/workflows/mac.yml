# Inspired by Angband's setup.
# https://github.com/angband/angband/blob/master/.github/workflows/mac.yaml

name: macOS

on:
  push:
    branches:
      - "**"
  # Skip macOS build for pull requests to save GitHub runner credits.
  pull_request:

# To cancel a currently running workflow from the same PR, branch, or tag
# when a new workflow is triggered.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-console:
    name: Console (GCU) Build
    runs-on: macos-latest
    steps:
      - name: Clone project
        uses: actions/checkout@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build with ncurses support
        run: |
          cd src
          make -f Makefile.std -j$(sysctl -n hw.ncpu) EXTRA_CFLAGS="-Werror" ENABLE_X11=0

  build:
    # NOTE: The macOS version mentioned here must match `DEPLOYMENT_TARGET`
    # defined in Makefile.cocoa.
    name: Cocoa Build (macOS 10.6 and later)
    runs-on: macos-latest
    steps:
      - name: Clone project
        uses: actions/checkout@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (x86_64 and arm64)
        run: |
          cd src
          make -f Makefile.cocoa ARCHS="arm64" -j$(sysctl -n hw.ncpu)  OPT="-Wall -O0" EXTRA_CFLAGS="-Werror"

  release-build:
    # NOTE: The macOS version mentioned here must match `DEPLOYMENT_TARGET`
    # defined in Makefile.cocoa.
    name: Cocoa Release Build (macOS 10.6 and later)
    runs-on: macos-latest
    steps:
      - name: Clone project
        uses: actions/checkout@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build with release flags (x86_64 and arm64)
        run: |
          cd src
          make -f Makefile.cocoa ARCHS="x86_64 arm64" -j$(sysctl -n hw.ncpu) OPT="-O2" EXTRA_CFLAGS="-Werror"

      - name: Verify build
        run: |
          ls -la Sil.app
          file Sil.app/Contents/MacOS/sil

      - name: Create archive
        run: zip -r Sil-Q-macos.zip Sil.app

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: Sil-Q-macos.zip
          path: Sil-Q-macos.zip
